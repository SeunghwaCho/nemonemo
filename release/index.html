<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>네모네모 로직 🧩</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #gameCanvas {
      display: block;
      touch-action: none;
    }

    #loading {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #ecf0f1;
      font-family: sans-serif;
      z-index: 100;
    }

    #loading .emoji {
      font-size: 64px;
      margin-bottom: 20px;
      animation: pulse 1s ease-in-out infinite;
    }

    #loading .title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    #loading .subtitle {
      font-size: 14px;
      color: #95a5a6;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="emoji">🧩</div>
    <div class="title">네모네모 로직</div>
    <div class="subtitle">로딩 중...</div>
  </div>
  <canvas id="gameCanvas"></canvas>
  <script src="dist/dist.js"></script>
  <script>
    // 로딩 화면 숨기기
    window.addEventListener('DOMContentLoaded', function() {
      setTimeout(function() {
        var loading = document.getElementById('loading');
        if (loading) loading.style.display = 'none';
      }, 500);
    });
  </script>
</body>
</html>
